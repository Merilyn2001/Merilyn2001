<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Inscrição</title>
    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    <main>
        <section class="container">
            <!-- Formulário -->
            <form action="" class="formulario">
                <fieldset class="formulario_itens">
                    <a class="voltar_pagina">
                        <img src="./assets/seta para esquerda.svg" alt="seta para esquerda"> Voltar
                    </a>
                    <h1> Formulário de Inscrição</h1>
                    <p> Preencha os dados abaixo para fazer sua inscrição no Programa Trilhas. </p>
                </fieldset>

                <fieldset class="formulario_itens">
                    <h2> Informações do participante</h2>
                    <label for="nome"> Nome completo
                        <input type="text" id="nome" name="nome" placeholder=" Digite seu nome" required><br>
                    </label>
                    <label for="nascimento"> Data de nascimento
                        <input type="date" id="nascimento" name="nascimento" required><br>
                    </label>
                    <label for="cpf">CPF
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" required><br>
                    </label>
                    <label for="sexo">Sexo
                        <select name="sexo" id="sexo" required>
                            <option value="">Selecione</option>
                            <option value="feminino">Feminino</option>
                            <option value="masculino">Masculino</option>
                            <option value="outro">Outro</option>
                        </select><br>
                    </label>

                    <div class="email_conteiner">
                        <label for="email">E-mail
                            <input type="email" id="email" name="email" placeholder="exemplo123@gmail.com" required><br>
                            <span id="erro-email" class="mensagem_erro">Insira um e-mail válido</span>
                        </label>
                    </div><br>

                    <label for="telefone">Telefone
                        <input type="text" id="telefone" name="telefone" required placeholder="(00) 0 0000-0000"><br><br>
                    </label>

                    <label for="documento de identidade">Documento de identidade
                        <div class="upload-documento de identidade">
                            <input type="file" id="documento" style="display: none;">
                            <label for="documento">
                                <img src="./assets/backup.svg" alt="icon backup">
                                <p> Clique aqui para selecionar o arquivo</p>
                            </label>
                        </div>
                    </label>

                    <h3>Endereço residencial</h3>
                    <div class="endereco-container">
                        <label for="cep">CEP
                            <input type="text" id="cep" name="cep" required placeholder="00000-000"><br>
                        </label>

                        <div class="rua-numero">
                            <label for="rua">Rua
                                <input type="text" id="rua" name="rua" required>
                            </label>

                            <label for="numero">Número
                                <input type="text" id="numero" name="numero" required>
                            </label>
                        </div>

                        <div class="cidade-estado">
                            <label for="cidade">Cidade
                                <input type="text" id="cidade" name="cidade" required>
                            </label>

                            <label for="estado">Estado
                                <input type="text" id="estado" name="estado" required><br><br>
                            </label>
                        </div>
                    </div>

                    <label for="comprovante de residência">Comprovante de Residência
                        <div class="upload-comprovante de residencia">
                            <input type="file" id="residencial" style="display: none;">
                            <label for="residencial">
                                <img src="./assets/backup.svg" alt="icon backup">
                                <p> Clique aqui para selecionar o arquivo</p>
                            </label>
                        </div>
                    </label>

                    <h3>Trilhas de aprendizagem</h3>
                    <p> Selecione apenas uma trilha. </p><br>

                    <!-- Grupo de Programação Front-end e Back-end -->
                    <div class="trilha-container">
                        <label>
                            <input type="radio" name="trilha" value="front-end">
                            <img src="./assets/frontend.svg" alt="icon" width="16">Programação Front-end
                        </label>

                        <label>
                            <input type="radio" name="trilha" value="back-end">
                            <img src="./assets/beckend.svg" alt="icon" width="16">Programação Back-end
                        </label>
                    </div>

                    <!-- Grupo de Programação de Jogos e Design e Experiência -->
                    <div class="trilha-container">
                        <label>
                            <input type="radio" name="trilha" value="programacao de jogos">
                            <img src="./assets/jogos.svg" alt="icon" width="16">Programação de jogos
                        </label>

                        <label>
                            <input type="radio" name="trilha" value="design e experiencia">
                            <img src="./assets/design.svg" alt="icon" width="16">Design e Experiência
                        </label>
                    </div>

                    <label>
                        <input type="radio" name="trilha" value="ciencia de dados">
                        <img src="./assets/dados.svg" alt="icon" width="16"> Ciência de dados
                    </label><br><br>

                    <div class="checkbox-container">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required>
                            Declaro que li e concordo com os
                            <a href="#">Termos e Condições</a> e com a
                            <a href="#">Política de Privacidade</a>.
                        </label>
                    </div>

                    <div class="buttons">
                        <button type="button" class="btn btn-cancel">Cancelar</button>
                        <button type="submit" class="btn btn-submit">Fazer inscrição</button>
                    </div>
                </fieldset>
            </form>

            <!-- Colocar a imagem do programador à direita -->
            <div class="imagens">
                <img class="formulario_itens_imagem do estudante com o notebook" src="./assets/estudante.svg" alt="imagem do estudante com o notebook.">
                <img class="formulario_itens_imagem_inova" src="./assets/trilha.svg" alt="Logo do programa trilhas do inova maranhão.">
            </div>
        </section>
    </main>
</body>
</html>
